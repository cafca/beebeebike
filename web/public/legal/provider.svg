<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="Platzhalter für Anbieter-Adresse">
  <rect width="640" height="200" fill="#F7F3EC"/>
  <rect x="1" y="1" width="638" height="198" fill="none" stroke="#2E6F66" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="320" y="90" text-anchor="middle" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#2E6F66">Platzhalter — Anbieter-Adresse</text>
  <text x="320" y="120" text-anchor="middle" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="14" fill="#2E6F66">wird vor Veröffentlichung durch ein Bild mit Name, Anschrift und E-Mail ersetzt</text>
</svg>
