name: beebeebike
description: Mobile navigation client for BeeBeeBike.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.7.2
  flutter: ^3.19.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  maplibre_gl: ^0.20.0
  geolocator: ^13.0.1
  flutter_compass: ^0.8.1
  flutter_tts: ^4.0.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  webview_flutter: ^4.7.0
  path_provider: ^2.1.5
  freezed_annotation: ^2.4.4
  turf: ^0.0.10
  clipper2: ^0.0.3
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  haptic_feedback: ^0.6.4
  ferrostar_flutter:
    path: ../packages/ferrostar_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  http_mock_adapter: ^0.6.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/styles/
