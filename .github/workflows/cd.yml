name: CD

on:
  workflow_call: {}
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  ship:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image
          build-args: |
            VITE_FATHOM_URL=${{ vars.VITE_FATHOM_URL }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Sync runtime config to server
        if: vars.DEPLOY_HOST != ''
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "compose.prod.yml,backend/graphhopper_config.yml"
          target: beebeebike/

      - name: Deploy via SSH
        if: vars.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/beebeebike
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d --remove-orphans
            docker image prune -f
