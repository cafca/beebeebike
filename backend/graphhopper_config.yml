graphhopper:

  # OSM input file — bind-mounted from host via docker-compose.yml
  datareader.file: /data/berlin.osm.pbf
  # Graph cache directory — bind-mounted from host so import survives container restarts
  graph.location: /data/graphhopper-cache

  # Custom model JSON files referenced by profiles below are loaded from this
  # directory inside the container (mounted from ./backend/custom_models).
  custom_models.directory: /custom_models

  profiles:
    - name: bike
      # Filename must not collide with GraphHopper's built-in bike.json on the
      # classpath (loader rejects identical names with "already used for
      # built-in profiles"); hence beebeebike.json.
      custom_model_files: [beebeebike.json]
      turn_costs:
        vehicle_types: [bicycle]
        u_turn_costs: 20

  profiles_navigation:
    - profile: bike

  # CH preparation disabled: the profile uses `weighting: custom` with dynamic
  # per-request priority rules (rated areas) and distance_influence overrides,
  # which CH cannot bake. Flexible mode handles every request.
  profiles_ch: []

  profiles_lm: []

  graph.encoded_values: |
    country, road_class, roundabout, max_speed, road_environment,
    bike_access, foot_access, bike_average_speed, bike_priority,
    bike_road_access, bike_network,
    mtb_rating, hike_rating, average_slope, ferry_speed,
    road_access, get_off_bike, surface, smoothness, cycleway, crossing

  graph.elevation.provider: srtm

  prepare.min_network_size: 200
  prepare.subnetworks.threads: 1

  routing.snap_preventions_default: tunnel, bridge, ferry
  routing.non_ch.max_waypoint_distance: 1000000

  import.osm.ignored_highways: ''

  graph.dataaccess.default_type: RAM_STORE

server:
  application_connectors:
  - type: http
    port: 8989
    max_request_header_size: 50k
  request_log:
      appenders: []
  admin_connectors:
  - type: http
    port: 8990

logging:
  appenders:
    - type: console
      time_zone: UTC
      log_format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
