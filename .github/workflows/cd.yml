name: CD

on:
  workflow_call: {}
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}
  GH_IMAGE: ghcr.io/${{ github.repository }}-graphhopper

jobs:
  ship:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image
          build-args: |
            VITE_FATHOM_URL=${{ vars.VITE_FATHOM_URL }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # Thin GH image that bakes in backend/custom_models/. Lets prod ship the
      # routing rules atomically with `docker compose pull` instead of host-side
      # scp dance.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/graphhopper.Dockerfile
          push: true
          cache-from: type=gha,scope=graphhopper-image
          cache-to: type=gha,mode=max,scope=graphhopper-image
          tags: |
            ${{ env.GH_IMAGE }}:latest
            ${{ env.GH_IMAGE }}:${{ github.sha }}

      - name: Sync runtime config to server
        if: vars.DEPLOY_HOST != ''
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "compose.prod.yml,backend/graphhopper_config.yml"
          target: beebeebike/

      - name: Deploy via SSH
        if: vars.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/beebeebike
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d --remove-orphans

            # If the new GH image carries a different profile (custom model or
            # config edit), GH will refuse to load the existing graph cache and
            # log "Profile '<name>' does not match". Detect that and reimport;
            # leave the cache alone otherwise so deploys stay fast.
            sleep 12
            if docker logs --tail 80 beebeebike-graphhopper 2>&1 | grep -q "does not match"; then
              echo "Profile hash mismatch detected — wiping GH cache and reimporting."
              docker compose -f compose.prod.yml stop graphhopper
              docker run --rm -v "$PWD/data/osm/berlin:/data" alpine \
                rm -rf /data/graphhopper
              docker compose -f compose.prod.yml up -d graphhopper
            fi

            docker image prune -f
