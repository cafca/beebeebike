
x-environment: &env
  DATABASE_URL: postgresql://glitchtip:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
  SECRET_KEY: ${SECRET_KEY}
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  EMAIL_URL: ${EMAIL_URL}
  CELERY_WORKER_AUTOSCALE: "1,3"
  CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"

x-depends: &depends
  - postgres
  - redis

services:
  postgres:
    image: postgres:16-alpine
    container_name: glitchtip-db
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 256m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    mem_limit: 64m
    restart: unless-stopped

  web:
    image: glitchtip/glitchtip
    container_name: glitchtip-web
    depends_on: *depends
    ports:
      - "127.0.0.1:${PORT:-3849}:8000"
    environment: *env
    volumes:
      - uploads:/code/uploads
    mem_limit: 256m
    restart: unless-stopped

  worker:
    image: glitchtip/glitchtip
    container_name: glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    depends_on: *depends
    environment: *env
    volumes:
      - uploads:/code/uploads
    mem_limit: 256m
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
