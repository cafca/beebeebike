name: beebeebike
description: Mobile navigation client for BeeBeeBike.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.7.2
  flutter: ^3.19.0

dependencies:
  clipper2: ^0.0.3
  cookie_jar: ^4.0.8
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  ferrostar_flutter:
    path: ../packages/ferrostar_flutter
  flutter:
    sdk: flutter
  flutter_compass: ^0.8.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_tts: ^4.0.2
  freezed_annotation: ^2.4.4
  geolocator: ^13.0.1
  google_fonts: ^6.2.1
  haptic_feedback: ^0.6.4
  intl: any
  json_annotation: ^4.9.0
  maplibre_gl: ^0.20.0
  path_provider: ^2.1.5
  sentry_flutter: ^9.19.0
  shared_preferences: ^2.3.2
  turf: ^0.0.10
  url_launcher: ^6.3.0
  wakelock_plus: ^1.2.8
  webview_flutter: ^4.7.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  http_mock_adapter: ^0.6.1
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter_launcher_icons:
  ios: true
  image_path: "../design/logo/AppIcon-1024.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/styles/
